<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Lock the viewport for a fullscreen game: no pinch-zoom, fit under notches (viewport-fit). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Tailgate — an animal kart racer</title>
    <meta
      name="description"
      content="Tailgate: a Mode-7 animal kart racer built from scratch — drift the bends, grab an acorn dash, race seven rivals or split-screen a friend. Plays in the browser, no download."
    />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="theme-color" content="#1b271a" />
    <!-- Open Graph + Twitter card. Absolute URLs (crawlers don't resolve relative); og.png ships beside index.html. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tailgate — an animal kart racer" />
    <meta
      property="og:description"
      content="A Mode-7 animal kart racer built from scratch. Drift the bends, race seven rivals or split-screen a friend. Plays in the browser."
    />
    <meta property="og:url" content="https://davidslv.uk/games/tailgate/" />
    <meta property="og:image" content="https://davidslv.uk/games/tailgate/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tailgate — an animal kart racer" />
    <meta
      name="twitter:description"
      content="A Mode-7 animal kart racer built from scratch. Drift the bends, race seven rivals or split-screen a friend."
    />
    <meta name="twitter:image" content="https://davidslv.uk/games/tailgate/og.png" />
    <!-- Structured data (schema.org / JSON-LD) — the modern machine-readable card. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Tailgate",
        "alternateName": "Tailgate — an animal kart racer",
        "description": "A Mode-7 animal kart racer built from scratch. Drift the bends, grab an acorn dash, race seven rivals or split-screen a friend. Plays in the browser, no download.",
        "url": "https://davidslv.uk/games/tailgate/",
        "image": "https://davidslv.uk/games/tailgate/og.png",
        "genre": ["Racing", "Arcade"],
        "gamePlatform": "Web Browser",
        "applicationCategory": "Game",
        "operatingSystem": "Any modern web browser",
        "playMode": ["SinglePlayer", "MultiPlayer"],
        "inLanguage": "en",
        "author": { "@type": "Person", "name": "David Silva", "url": "https://davidslv.uk" },
        "publisher": { "@type": "Organization", "name": "DS Laboratory" },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "GBP",
          "availability": "https://schema.org/InStock"
        }
      }
    </script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #101014;
        /* No bounce/overscroll on mobile — the play surface is fixed, not a scrollable page. */
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        inset: 0;
      }
      canvas {
        image-rendering: pixelated;
        /* Don't let a stray touch on the canvas pan/zoom the page. */
        touch-action: none;
      }
      /*
        Portrait nudge — shown ONLY on touch devices (pointer: coarse), so a portrait DESKTOP
        browser window is left alone. The opaque overlay covers the canvas until the player
        rotates to landscape, where this game's fixed 4:3 surface actually fits.
      */
      .rotate-hint {
        display: none;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        .rotate-hint {
          display: flex;
          position: fixed;
          inset: 0;
          z-index: 10;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 1.25rem;
          padding: 2rem;
          background: #101014;
          color: #9bb39b;
          font-family: system-ui, -apple-system, sans-serif;
          text-align: center;
        }
        .rotate-hint .glyph {
          font-size: 3rem;
          line-height: 1;
        }
        .rotate-hint .msg {
          font-size: 1.1rem;
          max-width: 18rem;
        }
        .rotate-hint strong {
          color: #ffd23f;
        }
      }
    </style>
    <script type="module" crossorigin src="/games/tailgate/assets/main-BRIBwgXU.js"></script>
  </head>
  <body>
    <!--
      The crisp, scaled play surface is built by @lockstep/canvas createCanvas()
      at runtime; src/shell/main.ts mounts it here and gives it id="game" so the
      headless smoke (scripts/smoke.mjs) can locate and screenshot it.
    -->
    <canvas id="game"></canvas>
    <!-- Shown by CSS only in portrait on a touch device; invisible on desktop and in landscape. -->
    <div class="rotate-hint" role="img" aria-label="Rotate your device to landscape to play Tailgate">
      <div class="glyph" aria-hidden="true">↻</div>
      <div class="msg">Rotate your device to <strong>landscape</strong> to play&nbsp;Tailgate.</div>
    </div>
  </body>
</html>
