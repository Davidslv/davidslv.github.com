    <!-- TR yellow -->
    <rect x="264" y="124" width="124" height="124" rx="16" fill="#f7d51d"/>
    <rect x="282" y="142" width="36" height="36" rx="7" fill="#ffffff" opacity="0.82"/>
    <!-- BL magenta -->
    <rect x="124" y="264" width="124" height="124" rx="16" fill="#d24fd0"/>
    <rect x="142" y="282" width="36" height="36" rx="7" fill="#ffffff" opacity="0.82"/>
    <!-- BR green -->
    <rect x="264" y="264" width="124" height="124" rx="16" fill="#4fd06a"/>
    <rect x="282" y="282" width="36" height="36" rx="7" fill="#ffffff" opacity="0.82"/>
