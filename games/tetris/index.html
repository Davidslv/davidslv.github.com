<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>NES Tetris — mechanics as they were</title>
  <meta name="description" content="A faithful study of NES Tetris mechanics — no hold, no ghost, no hard drop. Zero assets, plays fully offline in the browser." />
  <meta name="theme-color" content="#101014" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <!-- PWA: installable + offline (service worker in sw.js), and chromeless fullscreen on iOS
       when added to the Home Screen. -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tetris" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    html, body { margin: 0; height: 100%; background: #101014; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;   /* dynamic viewport: accounts for mobile Safari's bars */
      overflow: hidden;     /* the board never scrolls out of view */
    }
    /* The canvas is drawn at a fixed internal resolution; scale its DISPLAY size
       down to fit any screen (phones) while keeping aspect ratio, so the whole
       well is always visible. On desktop the maxes don't bind, so nothing changes. */
    canvas {
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 100dvh;
    }
  </style>
  <script type="module" crossorigin src="/games/tetris/assets/index-DLTHBHQW.js"></script>
</head>
<body>
  <canvas id="game"></canvas>
</body>
</html>
