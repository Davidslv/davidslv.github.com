"shape" ><rect x="133.000000" y="12.000000" width="277.000000" height="66.000000" stroke="#000536" fill="#E5F3FF" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="271.500000" y="50.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">1. Keyboard registers a key press</text></g><g class="czI="><g class="shape" ><rect x="12.000000" y="148.000000" width="520.000000" height="66.000000" stroke="#000536" fill="#E5F3FF" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="272.000000" y="186.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">2. KeyboardHandler forwards it to InputHandler.handle_input(key)</text></g><g class="czM="><g class="shape" ><rect x="73.000000" y="284.000000" width="398.000000" height="66.000000" stroke="#000536" fill="#E5F3FF" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="272.000000" y="322.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">3. InputHandler creates a Command for the action</text></g><g class="czQ="><g class="shape" ><rect x="60.000000" y="420.000000" width="424.000000" height="66.000000" stroke="#000536" fill="#E5F3FF" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="272.000000" y="458.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">4. InputHandler enqueues the Command on the World</text></g><g class="czU="><g class="shape" ><rect x="107.000000" y="556.000000" width="330.000000" height="66.000000" stroke="#000536" fill="#E5F3FF" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="272.000000" y="594.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">5. InputSystem.update() runs on its turn</text></g><g class="czY="><g class="shape" ><rect x="56.000000" y="692.000000" width="431.000000" height="66.000000" stroke="#000536" fill="#E5F3FF" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="271.500000" y="730.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">6. InputSystem asks the World to process_commands()</text></g><g class="czc="><g class="shape" ><rect x="93.000000" y="828.000000" width="357.000000" height="66.000000" stroke="#000536" fill="#E5F3FF" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="271.500000" y="866.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">7. The Command executes against the World</text></g><g class="czg="><g class="shape" ><rect x="37.000000" y="964.000000" width="470.000000" height="66.000000" stroke="#000536" fill="#E5F3FF" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="272.000000" y="1002.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">8. Command calls MovementSystem.move(entity, direction)</text></g><g class="czk="><g class="shape" ><rect x="74.000000" y="1100.000000" width="395.000000" height="66.000000" stroke="#000536" fill="#E5F3FF" class=" stroke-B1 fill-B6" style="stroke-width:2;" /></g><text x="271.500000" y="1138.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">9. MovementSystem updates the entity&#39;s position</text></g><g class="KHMxIC0mZ3Q7IHMyKVswXQ=="><marker id="mk-d2-1713846984-3488378134" markerWidth="10.000000" markerHeight="12.000000" refX="7.000000" refY="6.000000" viewBox="0.000000 0.000000 10.000000 12.000000" orient="auto" markerUnits="userSpaceOnUse"> <polygon points="0.000000,0.000000 10.000000,6.000000 0.000000,12.000000" fill="#000536" class="connection fill-B1" stroke-width="2" /> </marker><path d="M 272.000000 80.000000 L 272.000000 144.000000" stroke="#000536" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-1713846984-3488378134)" mask="url(#d2-1713846984)" /></g><g class="KHMyIC0mZ3Q7IHMzKVswXQ=="><path 